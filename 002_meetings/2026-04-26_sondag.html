# Møtereferat – søndag 26. april 2026

**Tilstede:** Gustavo Alfonso Holmedal, Thuy Thu Thi Tran, Inger Irgesund
**Møteleder:** Gustavo
**Referent:** Gustavo
**Sted/format:** Digitalt

---

## 1. Bakgrunn og hovedidé (kort repetisjon for gruppa)

Oppgaven handler om Skoringen Råholt. Butikken får bare bestille sko **to ganger i året** fra leverandøren. Vi finner ut hvor mye de bør bestille hver gang, slik at de hverken går tom eller sitter igjen med usolgte sko.

Hovedidéen i tre steg:

1. **Spå framtiden** — vi ser på hva som er solgt før og bruker en modell (SARIMA) til å gjette hva som blir solgt neste sesong.
2. **Bestem mengden** — vi bruker en formel som heter "Newsvendor". Den finner balansen mellom å bestille for lite (tapt salg) og for mye (sko som blir liggende).
3. **Sjekk pengene** — vi regner ut hvor mye butikken sparer på å bruke vår metode i stedet for det de gjør i dag.

---

## 2. Saker

### Sak 1 – Pensumkompendiet er nå integrert i oppgaven
Hele LOG650-pensumet (33 seksjoner) er pakket ut og lagt inn i prosjektet under `003_referanser/Kompendium/`. Vi bruker **22 av 33 seksjoner** aktivt i oppgaven. Hver gang oppgaven nevner en metode, viser vi hvilken pensumseksjon det er hentet fra. Det skaper en rød tråd som viser sensor at vi har brukt pensum riktig.

**Eksempler på pensumkobling:**
- SARIMA-prognosen → pensum **Ch01 §3** (trend og sesong)
- Newsvendor-formelen → pensum **Ch05 §5**
- Bullwhip-effekten → pensum **Ch05 §3**
- EOQ-kritikken → pensum **Ch10 §4**

En oversiktstabell over alle 22 koblingene ligger i §2.5 i hovedrapporten.

### Sak 2 – Mappestrukturen er ryddet
Vi hadde flere mapper med rotete navn (mellomrom, store/små bokstaver, tomme duplikater). Alt er nå navngitt etter samme mønster (`nnn_navn` med understrek), og tomme placeholdere er fjernet.

| Mappe | Hva ligger der |
|---|---|
| `000_templates/` | Maler fra skolen |
| `001_info/` | Kontaktinfo, bedriftsinfo om Skoringen, beslutningslogg |
| `002_meetings/` | Møtereferater (denne mappen) |
| `003_referanser/` | Litteraturliste **og** hele LOG650-pensumet |
| `004_data/` | PDF-rapporter fra butikken + vaskede CSV-filer |
| `006_analysis/` | Python-kode (PDF-leser, SARIMA, newsvendor) |
| `011_proposal/` | Prosjektforslaget |
| `012_plan/` | Prosjektplan, risiko, interessenter |
| `013_gjennomforing/` | Brukermanual, valideringsrapport, alle figurer |
| `014_report/` | **Selve bacheloroppgaven** |

### Sak 3 – Resultater så langt (på 2025-data)

| Hva | Tall |
|---|---|
| Treff på prognosen | **15,8 % bedre** enn dagens metode |
| Anbefalt vårbestilling 2025 | 6 030 par sko |
| Anbefalt høstbestilling 2025 | 3 568 par sko |
| Estimert ekstra fortjeneste pr år | **+713 621 NOK (+14,4 %)** |

### Sak 4 – Slik leser dere rapporten
Det ligger nå to versjoner av rapporten i `014_report/`:

1. **Vanlig tekst:** `Bacheloroppgave_Skoringen_KOMPLETT.md` — kan åpnes i hvilken som helst tekstleser, og GitHub viser den direkte.
2. **Pent formatert:** `Bacheloroppgave_Skoringen_KOMPLETT.html` — dobbeltklikk så åpnes den i nettleseren med formler, tabeller og figurer som ferdig oppgave.

Det viktigste å forstå er **hvorfor** vi gjør tingene, ikke matematikken bak. Hovedlinja er: butikken bestiller blindt → vi gir dem en bedre prognose → mindre bom = mer penger og mindre sløsing.

---

## 3. Beslutninger
- Pensumkompendiet er fast referansegrunnlag og siteres aktivt i alle metodevalg.
- Mappestruktur frosset på dagens form (`nnn_navn` snake_case). Nye mapper følger samme mønster.
- Hovedrapporten ligger i `014_report/`. Tidligere versjoner og placeholdere er fjernet.
- Alt er pushet til GitHub: `github.com/LOG650/G04-gruppe-4.5`.
